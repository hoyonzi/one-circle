<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>one-circle-one-circle-one-big-circle</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    background:#fff;
    font-family: Arial, sans-serif;
    overflow-y:scroll;
}

header{
    position:fixed;
    top:0;
    left:0;
    width:100%;
    padding:12px 16px;
    background:rgba(255,255,255,0.9);
    backdrop-filter:blur(10px);
    z-index:100;
}

header h1{
    font-size:14px;
    font-weight:400;
    letter-spacing:1px;
}

.gallery{
    margin-top:50px;
    display:grid;
    grid-template-columns:repeat(auto-fill,minmax(180px,1fr));
    gap:2px;
}

.item{
    background:#fff;
    cursor:pointer;
}

.photo-wrap{
    aspect-ratio:1/1;
    overflow:hidden;
    background:#f5f5f5;
}

.photo-wrap img{
    width:100%;
    height:100%;
    object-fit:cover;
    display:block;
    transition:.3s;
}

.item:hover img{
    transform:scale(1.05);
}

.caption{
    padding:7px 8px 10px;
    font-size:11px;
    line-height:1.35;
    background:#fff;
}

.caption h2{
    font-size:11px;
    font-weight:600;
    margin-bottom:3px;
}

.caption p{
    color:#555;
    white-space:pre-wrap;
}

/* 라이트박스 */

.lightbox{
    position:fixed;
    inset:0;
    background:rgba(0,0,0,.92);
    display:none;
    justify-content:center;
    align-items:center;
    z-index:9999;
    padding:30px;
}

.lightbox.show{
    display:flex;
}

.lightbox-content{
    max-width:90vw;
    max-height:90vh;
    color:white;
}

.lightbox-content img{
    max-width:90vw;
    max-height:75vh;
    display:block;
    margin:0 auto 12px;
}

.lightbox-title{
    font-size:14px;
    margin-bottom:5px;
}

.lightbox-description{
    font-size:12px;
    line-height:1.5;
    color:#ddd;
    white-space:pre-wrap;
}

@media(max-width:700px){
    .gallery{
        grid-template-columns:repeat(auto-fill,minmax(120px,1fr));
    }

    .caption{
        font-size:10px;
        padding:5px 6px 8px;
    }

    .caption h2{
        font-size:10px;
    }
}
</style>
</head>

<body>

<header>
    <h1>one circle one circle one big circle</h1>
</header>

<div id="gallery" class="gallery"></div>

<div id="lightbox" class="lightbox">
    <div class="lightbox-content">
        <img id="lightboxImage">
        <div id="lightboxTitle" class="lightbox-title"></div>
        <div id="lightboxDescription" class="lightbox-description"></div>
    </div>
</div>

<script>
const CHANNEL = "one-circle-one-circle-one-big-circle";

async function loadArenaImages(){

    try{
        const response = await fetch(
            `https://api.are.na/v2/channels/${CHANNEL}?per=100`
        );

        const data = await response.json();

        const images = data.contents.filter(
            item => item.class === "Image"
        );

        const gallery = document.getElementById("gallery");

        gallery.innerHTML = "";

        images.reverse();

        images.forEach(image => {

            const title = image.title || "";
            const description = image.description || "";

            const item = document.createElement("div");
            item.className = "item";

            const photoWrap = document.createElement("div");
            photoWrap.className = "photo-wrap";

            const img = document.createElement("img");
            img.src = image.image.display.url;
            img.alt = title;
            img.loading = "lazy";

            photoWrap.appendChild(img);

            const caption = document.createElement("div");
            caption.className = "caption";

            caption.innerHTML = `
                ${title ? `<h2>${title}</h2>` : ""}
                ${description ? `<p>${description}</p>` : ""}
            `;

            item.appendChild(photoWrap);

            if(title || description){
                item.appendChild(caption);
            }

            item.addEventListener("click",()=>{

                document
                .getElementById("lightbox")
                .classList.add("show");

                document
                .getElementById("lightboxImage")
                .src = image.image.original.url;

                document
                .getElementById("lightboxTitle")
                .textContent = title;

                document
                .getElementById("lightboxDescription")
                .textContent = description;

            });

            gallery.appendChild(item);

        });

    }catch(error){

        console.error(error);

        document.getElementById("gallery").innerHTML =
        "<p style='padding:20px'>사진을 불러오지 못했습니다.</p>";

    }
}

loadArenaImages();

document
.getElementById("lightbox")
.addEventListener("click",()=>{

    document
    .getElementById("lightbox")
    .classList.remove("show");

});
</script>

</body>
</html>
